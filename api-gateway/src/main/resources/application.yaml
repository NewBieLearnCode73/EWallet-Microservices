spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8888
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: profile-service
              uri: http://localhost:8082
              predicates:
                - Path=/profile/**
              filters:
                - StripPrefix=1

logging:
  level:
    org.springframework.cloud.gateway: TRACE
