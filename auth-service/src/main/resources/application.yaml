spring:
  application:
    name: auth-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/realms/ewallet-realm

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    initial-instance-info-replication-interval-seconds: 5
    registry-fetch-interval-seconds: 5
    register-with-eureka: true
    fetch-registry: true
  instance:
    lease-expiration-duration-in-seconds: 5
    lease-renewal-interval-in-seconds: 5
    prefer-ip-address: true

keycloak:
  admin-client:
    server-url: http://localhost:9999
    realm: ewallet-realm
    client-id: ewallet-auth-service-client
    client-secret: fe12FBYR5E8yHRcaD6vwRyKWrUEN7ZPd

token:
  expiration:
    access-token: 300
    refresh-token: 1800

logging:
  level:
    org.springframework.security: TRACE
